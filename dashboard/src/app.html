<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A scikit-learn AI trader races 100,000 random monkeys on real S&P 500 prices, one tick per US trading day. Public dashboard." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f4ecd7" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Monkey vs Machine" />
    <meta property="og:title" content="Monkey vs Machine" />
    <meta property="og:description" content="Can a scikit-learn model beat 100,000 monkeys throwing darts? A perpetual sim on real S&P 500 prices." />
    <meta property="og:url" content="https://mvm-dashboard.pages.dev/" />
    <meta property="og:image" content="https://mvm-dashboard.pages.dev/og-card.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Monkey vs Machine" />
    <meta name="twitter:description" content="Can a scikit-learn model beat 100,000 monkeys throwing darts? A perpetual sim on real S&P 500 prices." />
    <meta name="twitter:image" content="https://mvm-dashboard.pages.dev/og-card.svg" />

    <title>Monkey vs Machine</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mvm-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
