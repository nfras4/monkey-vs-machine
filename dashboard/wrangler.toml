name = "mvm-dashboard"
compatibility_date = "2025-01-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "mvm-prod"
database_id = "REPLACE_WITH_REAL_ID_AFTER_wrangler_d1_create"

# Set via `wrangler pages secret put MVM_INGEST_TOKEN` after first deploy.
# Set PUBLISH_SCHEMA_VERSION via `wrangler pages env put PUBLISH_SCHEMA_VERSION 1`.
[vars]
PUBLISH_SCHEMA_VERSION = "1"
