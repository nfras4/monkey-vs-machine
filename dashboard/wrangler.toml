name = "mvm-dashboard"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]   # SvelteKit's CF adapter uses node:async_hooks
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "mvm-prod"
database_id = "04504983-c94d-4817-a40e-1af7789195e9"

# Both MVM_INGEST_TOKEN and PUBLISH_SCHEMA_VERSION are set as Pages secrets
# (`wrangler pages secret put ...`). No [vars] block — secrets and vars share a
# namespace and a duplicate binding blocks deploy.
